<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>devMentor – Local Chat (Created by Mayan)</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.10.0/styles/github-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.10.0/highlight.min.js"></script>
  <style>
    * { box-sizing: border-box; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }

    body {
      margin: 0;
      background: #0f172a;
      color: #e5e7eb;
      display: flex;
      justify-content: center;
      align-items: stretch;
      height: 100vh;
    }

    .app {
      width: 100%;
      max-width: 900px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      padding: 16px;
    }

    .header {
      padding-bottom: 8px;
      border-bottom: 1px solid #1f2937;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header-title {
      font-size: 20px;
      font-weight: 600;
    }

    .header-sub {
      font-size: 12px;
      color: #9ca3af;
    }

    .chat-window {
      flex: 1;
      overflow-y: auto;
      padding: 8px 4px;
      border-radius: 12px;
      background: #020617;
      border: 1px solid #1f2937;
    }

    .message {
      max-width: 80%;
      padding: 10px 12px;
      margin: 6px 0;
      border-radius: 10px;
      font-size: 14px;
      line-height: 1.4;
      white-space: normal;
      word-wrap: break-word;
    }

    .message pre {
      background: #0d1117;
      border-radius: 6px;
      padding: 12px;
      overflow-x: auto;
      margin: 8px 0;
    }

    .message code {
      font-family: ui-monospace, Menlo, Monaco, "Cascadia Mono", "Segoe UI Mono", monospace;
      font-size: 13px;
    }

    .message p {
      margin-top: 0;
      margin-bottom: 0.5em;
    }

    .message p:last-child {
      margin-bottom: 0;
    }

    .user {
      margin-left: auto;
      background: #3b82f6;
      color: white;
      border-bottom-right-radius: 2px;
    }

    .assistant {
      margin-right: auto;
      background: #111827;
      border-bottom-left-radius: 2px;
      border: 1px solid #1f2937;
    }

    .input-area {
      margin-top: 10px;
      display: flex;
      gap: 8px;
    }

    #prompt {
      flex: 1;
      resize: none;
      min-height: 50px;
      max-height: 120px;
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid #374151;
      background: #020617;
      color: #e5e7eb;
      font-size: 14px;
    }

    #sendBtn {
      padding: 10px 16px;
      border-radius: 8px;
      border: none;
      background: #22c55e;
      color: #022c22;
      font-weight: 600;
      cursor: pointer;
      font-size: 14px;
    }

    #sendBtn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .status {
      font-size: 12px;
      color: #9ca3af;
      margin-top: 4px;
      min-height: 16px;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <div>
        <div class="header-title">devMentor</div>
        <div class="header-sub">Local fine-tuned code tutor (1.3B, QLoRA)</div>
      </div>
      <div class="header-sub">Backend: http://127.0.0.1:8000/chat</div>
    </div>

    <div id="chat" class="chat-window"></div>

    <div class="input-area">
      <textarea id="prompt" placeholder="Ask devMentor something about code or DSA..."></textarea>
      <button id="sendBtn">Send</button>
    </div>
    <div id="status" class="status"></div>
  </div>

  <script>
    const API_URL_STREAM = "http://127.0.0.1:8000/chat_stream";

    const chatEl = document.getElementById("chat");
    const promptEl = document.getElementById("prompt");
    const sendBtn = document.getElementById("sendBtn");
    const statusEl = document.getElementById("status");

    let chatHistory = JSON.parse(localStorage.getItem('devMentorChat')) || [];

    function addMessageDiv(role) {
      const div = document.createElement("div");
      div.classList.add("message", role === "user" ? "user" : "assistant");
      chatEl.appendChild(div);
      return div;
    }
    
    // Initial Load
    chatHistory.forEach(msg => {
       const div = addMessageDiv(msg.role);
       if (msg.role === "user") {
           div.textContent = msg.text;
       } else {
           div.innerHTML = marked.parse(msg.text);
           div.querySelectorAll('pre code').forEach((block) => {
              hljs.highlightElement(block);
           });
       }
    });
    chatEl.scrollTop = chatEl.scrollHeight;

    async function sendMessage() {
      const text = promptEl.value.trim();
      if (!text) return;

      // Add user message
      const userDiv = addMessageDiv("user");
      userDiv.textContent = text;
      chatHistory.push({ role: "user", text: text });
      
      promptEl.value = "";
      promptEl.focus();

      sendBtn.disabled = true;
      statusEl.textContent = "Generating...";

      try {
        const res = await fetch(API_URL_STREAM, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            query: text,
            max_new_tokens: 512
          }),
        });

        if (!res.ok) throw new Error("HTTP " + res.status);

        const reader = res.body.getReader();
        const decoder = new TextDecoder("utf-8");
        
        let assistantText = "";
        const assistantDiv = addMessageDiv("assistant");
        
        while (true) {
          const { value, done } = await reader.read();
          if (done) break;
          const chunk = decoder.decode(value, { stream: true });
          
          const lines = chunk.split("\n");
          for (let line of lines) {
             if (line.startsWith("data: ")) {
                 const data = line.replace("data: ", "");
                 if (data === "[DONE]") break;
                 try {
                     const parsed = JSON.parse(data);
                     assistantText += parsed.text;
                     assistantDiv.innerHTML = marked.parse(assistantText);
                     assistantDiv.querySelectorAll('pre code').forEach((block) => {
                        hljs.highlightElement(block);
                     });
                     chatEl.scrollTop = chatEl.scrollHeight;
                 } catch (e) { }
             }
          }
        }
        
        statusEl.textContent = "";
        chatHistory.push({ role: "assistant", text: assistantText });
        localStorage.setItem('devMentorChat', JSON.stringify(chatHistory));
        
      } catch (err) {
        console.error(err);
        statusEl.textContent = "Error talking to devMentor. Is the server running?";
      } finally {
        sendBtn.disabled = false;
      }
    }

    sendBtn.addEventListener("click", sendMessage);

    promptEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });
  </script>
</body>
</html>
